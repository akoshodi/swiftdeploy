services:
  image: swift-deploy-1-node:latest
  port: 3000
  mode: stable
  app_version: "1.0.0"
  container_name: swiftdeploy-app
  restart: unless-stopped

nginx:
  image: nginx:latest
  port: 8080
  proxy_timeout: 30s
  container_name: swiftdeploy-nginx
  restart: unless-stopped
  service_name: swiftdeploy-api
  contact: devops@swiftdeploy.local

network:
  name: swiftdeploy-net
  driver_type: bridge

opa:
  image: openpolicyagent/opa:0.67.1-static
  host_port: 8181
  container_name: swiftdeploy-opa
  restart: unless-stopped

policy:
  infrastructure:
    min_disk_free_gb: 10
    max_cpu_load: 2.0
  canary_safety:
    max_error_rate_pct: 1.0
    max_p99_latency_ms: 500
    window_seconds: 30

volumes:
  app_logs: swiftdeploy-app-logs
  nginx_logs: swiftdeploy-nginx-logs
